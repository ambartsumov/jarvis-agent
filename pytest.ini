[pytest]
# Disable ROS/ament launch_testing plugin that breaks collection in this env
addopts = -p no:launch_testing -p no:launch_ros -ra -q
asyncio_mode = auto
# Curated v2 test suite (legacy tests live in tests/ but are excluded by default)
testpaths =
    pds_ultimate/tests/test_v2_core.py
    pds_ultimate/tests/test_security.py
    pds_ultimate/tests/test_agent_core.py
    pds_ultimate/tests/test_memory_ops.py
    pds_ultimate/tests/test_orchestrator.py
    pds_ultimate/tests/test_factory.py
    pds_ultimate/tests/test_autonomy.py
    pds_ultimate/tests/test_triggers.py
filterwarnings =
    ignore::DeprecationWarning
