---
name: Bug report
description: Something is broken
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Commit or version
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs (redact secrets)
      description: bridge.log / openclaw.log excerpts
